<script>
    // Existing functions from the original file
    function toggleCategory(index) {
        const category = document.getElementById(`category-${index}`);
        const icon = document.getElementById(`category-icon-${index}`);
        if (category.classList.contains('hidden')) {
            category.classList.remove('hidden');
            icon.textContent = 'expand_less';
        } else {
            category.classList.add('hidden');
            icon.textContent = 'expand_more';
        }
    }

    function toggleEndpoint(catIndex, endpointIndex) {
        const endpoint = document.getElementById(`endpoint-${catIndex}-${endpointIndex}`);
        const icon = document.getElementById(`endpoint-icon-${catIndex}-${endpointIndex}`);
        if (endpoint.classList.contains('hidden')) {
            endpoint.classList.remove('hidden');
            icon.textContent = 'expand_less';
        } else {
            endpoint.classList.add('hidden');
            icon.textContent = 'expand_more';
        }
    }

    async function executeRequest(event, catIndex, endpointIndex, method, path, produces) {
        event.preventDefault();
        const form = document.getElementById(`form-${catIndex}-${endpointIndex}`);
        const responseDiv = document.getElementById(`response-${catIndex}-${endpointIndex}`);
        const responseContent = document.getElementById(`response-content-${catIndex}-${endpointIndex}`);
        const clearButton = document.getElementById(`clear-${catIndex}-${endpointIndex}`);
        
        const formData = new FormData(form);
        const params = new URLSearchParams();
        for (const [key, value] of formData.entries()) {
            if (value) {
                params.append(key, value);
            }
        }

        const fullPath = `${path}?${params.toString()}`;
        responseDiv.classList.remove('hidden');
        responseContent.innerHTML = '<div class="loader"></div>';

        try {
            const response = await fetch(fullPath);
            const contentType = response.headers.get("content-type");
            if (contentType && contentType.includes("application/json")) {
                const data = await response.json();
                responseContent.innerHTML = `<pre class="whitespace-pre-wrap">${JSON.stringify(data, null, 2)}</pre>`;
            } else if (contentType && contentType.startsWith("image/")) {
                const blob = await response.blob();
                const imageUrl = URL.createObjectURL(blob);
                responseContent.innerHTML = `<img src="${imageUrl}" class="max-w-full h-auto rounded-md">`;
            } else {
                const text = await response.text();
                responseContent.innerHTML = `<pre class="whitespace-pre-wrap">${text}</pre>`;
            }
        } catch (error) {
            responseContent.innerHTML = `<pre class="whitespace-pre-wrap text-beast-red">${error}</pre>`;
        }
        clearButton.classList.remove('hidden');
    }

    function clearResponse(catIndex, endpointIndex) {
        const responseDiv = document.getElementById(`response-${catIndex}-${endpointIndex}`);
        const responseContent = document.getElementById(`response-content-${catIndex}-${endpointIndex}`);
        const clearButton = document.getElementById(`clear-${catIndex}-${endpointIndex}`);
        responseContent.innerHTML = '';
        responseDiv.classList.add('hidden');
        clearButton.classList.add('hidden');
    }

    // Function to load and render APIs
    async function loadApis() {
        const apiList = document.getElementById('apiList');
        try {
            const response = await fetch('/assets/settings.json');
            const data = await response.json();
            
            let html = '';
            data.categories.forEach((category, catIndex) => {
                html += `
                <div class="category-group" data-category="${category.name}">
                    <div class="mb-2">
                        <div class="bg-gray-900 border border-beast-purple/30">
                            <button onclick="toggleCategory(${catIndex})" class="w-full px-4 py-3 text-left flex items-center justify-between hover:bg-beast-purple/10 transition-colors duration-150">
                                <h2 class="font-bold flex items-center">
                                    <span class="material-icons text-lg mr-3 text-beast-red">folder</span>
                                    <span class="truncate max-w-xs text-sm text-beast-silver">${category.name}</span>
                                    <span class="ml-2 text-xs text-beast-red/60">(${category.items.length})</span>
                                </h2>
                                <span class="material-icons transition-transform duration-150 text-beast-red" id="category-icon-${catIndex}">expand_more</span>
                            </button>
                            
                            <div id="category-${catIndex}" class="hidden">`;
                
                category.items.forEach((item, endpointIndex) => {
                    const method = 'GET'; // Assuming all are GET for now
                    const pathParts = item.path.split('?');
                    const path = pathParts[0];
                    const queryParams = new URLSearchParams(pathParts[1] || '');

                    const statusClasses = {
                        'ready': 'bg-beast-red/20 text-beast-red',
                        'update': 'bg-yellow-500/20 text-yellow-400',
                        'error': 'bg-red-500/20 text-red-400'
                    };
                    const statusClass = statusClasses[item.status] || 'bg-gray-600';

                    html += `
                                <div class="border-t border-beast-purple/20 api-item" 
                                     data-method="${method}"
                                     data-path="${path}"
                                     data-alias="${item.name}"
                                     data-description="${item.desc}"
                                     data-category="${category.name}">
                                    <button onclick="toggleEndpoint(${catIndex}, ${endpointIndex})" class="w-full px-4 py-3 text-left flex items-center justify-between hover:bg-beast-purple/10 transition-colors duration-150">
                                        <div class="flex items-center min-w-0 flex-1">
                                            <span class="inline-block px-3 py-1 text-xs font-semibold text-white mr-3 flex-shrink-0 bg-beast-purple">
                                                ${method}
                                            </span>
                                            <div class="flex flex-col min-w-0 flex-1">
                                                <span class="font-semibold truncate max-w-[90%] font-mono text-sm text-slate-200" title="${path}">${path}</span>
                                                <div class="flex items-center">
                                                    <span class="text-xs text-slate-500 truncate max-w-[90%]" title="${item.name}">${item.name}</span>
                                                    <span class="ml-2 px-2 py-0.5 text-[10px] rounded-full ${statusClass}">${item.status || 'ready'}</span>
                                                </div>
                                            </div>
                                        </div>
                                        <span class="material-icons transition-transform duration-150 flex-shrink-0 text-slate-500" id="endpoint-icon-${catIndex}-${endpointIndex}">expand_more</span>
                                    </button>
                                    
                                    <div id="endpoint-${catIndex}-${endpointIndex}" class="hidden bg-gray-900 p-4 border-t border-beast-purple/20">
                                        <div class="mb-3">
                                            <div class="text-slate-400 text-xs">${item.desc}</div>
                                        </div>
                                        `;
                    if (item.status === 'ready') {
                        html += `
                                            <div>
                                                <div class="text-beast-silver font-bold text-xs mb-2 flex items-center">
                                                    <span class="material-icons text-sm mr-1 text-beast-red">play_arrow</span>
                                                    TRY IT OUT
                                                </div>
                                                <div>
                                                    <form id="form-${catIndex}-${endpointIndex}" onsubmit="executeRequest(event, ${catIndex}, ${endpointIndex}, '${method}', '${path}', 'application/json')">
                                                        <div class="mb-4 space-y-2">`;
                        if (item.params) {
                            Object.keys(item.params).forEach(paramName => {
                                const isRequired = !queryParams.has(paramName) || queryParams.get(paramName) === '';
                                 html += `<div>
                                            <label class="block text-xs font-medium text-slate-400 mb-2">${paramName} ${isRequired ? '<span class="text-beast-red">*</span>' : ''}</label>
                                            <input type="text" name="${paramName}" class="w-full px-3 py-2 border border-beast-purple/50 text-sm focus:outline-none focus:border-beast-red bg-gray-800 text-slate-200 placeholder:text-slate-600" placeholder="${item.params[paramName]}" ${isRequired ? 'required' : ''}>
                                          </div>`;
                            });
                        }
                        html += `
                                                        </div>
                                                        <button type="submit" class="btn-gradient font-semibold text-white px-6 py-2 text-xs font-medium transition-colors duration-150">
                                                            Execute
                                                        </button>
                                                        <button type="button" id="clear-${catIndex}-${endpointIndex}" onclick="clearResponse(${catIndex}, ${endpointIndex})" class="hidden bg-gray-800 border border-beast-purple/50 hover:border-beast-red font-semibold text-slate-300 px-6 py-2 text-xs font-medium transition-colors duration-150 ml-2">
                                                            Clear
                                                        </button>
                                                    </form>
                                                </div>
                                            </div>`;
                    } else {
                        html += `<div class="text-yellow-400 text-xs p-3 bg-yellow-500/20 border border-yellow-500/30">Endpoint ini no activo.</div>`;
                    }

                    html += `
                                        <div id="response-${catIndex}-${endpointIndex}" class="hidden mt-4">
                                            <div class="text-beast-silver font-bold text-xs mb-2 flex items-center">
                                                <span class="material-icons text-sm mr-1 text-beast-red">code</span>
                                                RESPONSE
                                            </div>
                                            <div class="bg-black/50 text-slate-300 text-xs p-4 border border-beast-purple/30">
                                                <div class="max-h-80 overflow-auto" id="response-content-${catIndex}-${endpointIndex}"></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>`;
                });
                html += `</div></div></div>`;
            });
            apiList.innerHTML = html;
        } catch (error) {
            apiList.innerHTML = '<p class="text-beast-red">Failed to load API data.</p>';
            console.error('Error loading API data:', error);
        }
    }
    
    // Function to load and render notifications
    async function loadNotifications() {
        const notificationsList = document.getElementById('notifications-list');
        const unreadCountBadge = document.getElementById('unread-count');
        try {
            const response = await fetch('/notifications.json');
            const notifications = await response.json();

            notificationsList.innerHTML = ''; // Clear loader
            let unreadCount = 0;

            // Sort notifications by date, newest first
            notifications.sort((a, b) => new Date(b.date) - new Date(a.date));

            notifications.forEach(notif => {
                if (!notif.read) {
                    unreadCount++;
                }
                const notifElement = document.createElement('div');
                notifElement.className = `bg-gray-900/50 border border-beast-purple/20 p-4 text-xs ${notif.read ? 'opacity-60' : ''}`;
                notifElement.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <p class="font-bold text-beast-silver mb-1">${notif.title}</p>
                            <p class="text-slate-400">${notif.message}</p>
                        </div>
                        <div class="flex items-center ml-4 flex-shrink-0">
                            ${!notif.read ? '<div class="w-2 h-2 bg-beast-red rounded-full mr-2" title="Unread"></div>' : ''}
                            <span class="text-slate-500">${new Date(notif.date).toLocaleDateString('id-ID', { year: 'numeric', month: 'short', day: 'numeric' })}</span>
                        </div>
                    </div>
                `;
                notificationsList.appendChild(notifElement);
            });

            if (unreadCount > 0) {
                unreadCountBadge.textContent = `${unreadCount} Nuevo`;
                unreadCountBadge.classList.remove('hidden');
            }

        } catch (error) {
            notificationsList.innerHTML = '<p class="text-beast-red text-xs">Gagal memuat notifikasi.</p>';
            console.error('Error loading notifications:', error);
        }
    }

    // Search functionality
    document.getElementById('searchInput').addEventListener('input', function() {
        const searchTerm = this.value.toLowerCase();
        const apiItems = document.querySelectorAll('.api-item');
        const categories = document.querySelectorAll('.category-group');
        const noResults = document.getElementById('noResults');
        let visibleCount = 0;

        apiItems.forEach(item => {
            const path = item.dataset.path.toLowerCase();
            const alias = item.dataset.alias.toLowerCase();
            const description = item.dataset.description.toLowerCase();
            
            if (path.includes(searchTerm) || alias.includes(searchTerm) || description.includes(searchTerm)) {
                item.style.display = '';
                visibleCount++;
            } else {
                item.style.display = 'none';
            }
        });

        categories.forEach(category => {
            const visibleItems = category.querySelectorAll('.api-item[style=""]');
            if (visibleItems.length > 0) {
                category.style.display = '';
            } else {
                category.style.display = 'none';
            }
        });

        if (visibleCount === 0) {
            noResults.style.display = 'block';
        } else {
            noResults.style.display = 'none';
        }
    });


    // Initial load
    document.addEventListener('DOMContentLoaded', () => {
        loadApis();
        loadNotifications();
    });
</script>
